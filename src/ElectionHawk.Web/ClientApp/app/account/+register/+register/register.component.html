<div class="row">
    <div class="col-lg-6">
        <div class="card card-outline-info">
            <div class="card-header">
                <h4 class="m-b-0 text-white">Sign up</h4>
            </div>
            <div class="row justify-content-center">
                <div class="col-lg-12 col-lg-6">
                    <div>
                        <div class="card-block container">
                            <appc-dynamic-form (onSubmit)="register($event)" [controls]="controls" [btnText]="'Sign up'"></appc-dynamic-form>
                        </div>
                        <br />
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
