<p-table [value]="voterslist" [paginator]="true" [rows]="10">
    <ng-template pTemplate="header">
        <tr>
            <th>VoterListId</th>
            <th>VoterListTitle</th>
            <th>VoterListType</th>
            <th>TargetCommunityId</th>
        </tr>
    </ng-template>
    <ng-template pTemplate="body" let-vlist >
        <tr>
            <td>{{vlist?.voterListId}}</td>
            <td>{{vlist?.voterListTitle}}</td>
            <td>{{vlist?.voterListType}}</td>
            <td>{{vlist?.targetCommunityId}}</td>

        </tr>
    </ng-template>
</p-table>
