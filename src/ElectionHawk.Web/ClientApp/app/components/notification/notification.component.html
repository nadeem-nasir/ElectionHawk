<p-table [value]="notification" [paginator]="true" [rows]="10">
    <ng-template pTemplate="header">
        <tr>
            <!-- <th>Serial</th> -->
            <th>Id</th>
            <th>Description</th>
        </tr>
    </ng-template>
    <ng-template pTemplate="body" let-not>
        <tr>
            <td>{{not?.notificationId}}</td>
            <td>{{not?.description}}</td>
        </tr>
    </ng-template>
</p-table>
