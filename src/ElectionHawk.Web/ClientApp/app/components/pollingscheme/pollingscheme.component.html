<p-table [value]="pollingschemestation" [paginator]="true" [rows]="10">

        <tr>
            <!-- <th>StationId</th> -->
            <th>StationName</th>
            <!-- <th>MaleBooths</th> -->
            <!-- <th>FemaleBooths</th> -->
            <th>TotalBooths</th>
            <!-- <th>MaleVoters</th> -->
            <!-- <th>FemaleVoters</th> -->
            <th>TotalVoters</th>

            <!-- <th>PollingStationMapUrl</th> -->
            <th>ECPPSNo</th>
        </tr>

        </tr>
    </ng-template>
