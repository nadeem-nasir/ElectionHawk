<div class="row">
    <div class="col-lg-12">
        <div class="card card-outline-info">
            <div class="card-header">
                <h4 class="m-b-0 text-white">News Form</h4>
            </div>
            <div class="card-body">
                <h4 class="card-title">Sample Form with the Icons</h4>
                <h6 class="card-subtitle">made with bootstrap elements</h6>

                <form class="form p-t-20" novalidate *ngIf="news" (ngSubmit)="save()" [formGroup]="newsEditForm">
                    <div class="form-group">
                        <label for="heading">Heading</label>
                        <div class="input-group">
                            <div class="input-group-addon"><i class="ti-user"></i></div>
                            <input class="form-control" id="heading" type="text" formControlName="heading" placeholder="heading">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="description">Description</label>
                        <div class="input-group">
                            <div class="input-group-addon"><i class="ti-email"></i></div>
                            <textarea rows="5" cols="5" class="form-control" formControlName="description" placeholder="description"></textarea>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="source">Source</label>
                        <div class="input-group">
                            <div class="input-group-addon"><i class="ti-lock"></i></div>
                            <input class="form-control" id="source" placeholder="Source" type="text" formControlName="source">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="publishedDate">Published Date</label>
                        <div class="input-group">
                            <div class="input-group-addon"><i class="ti-lock"></i></div>
                            <input class="form-control" id="publishedDate" placeholder="Published Date" formControlName="publishedDate" type="date">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="createdDate">Created Date</label>
                        <div class="input-group">
                            <div class="input-group-addon"><i class="ti-lock"></i></div>
                            <input class="form-control" id="createdDate" formControlName="createdDate" placeholder="Created Date" type="date">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-success waves-effect waves-light m-r-10">Submit</button>
                    <button type="submit" class="btn btn-inverse waves-effect waves-light">Cancel</button>
                      
                </form>
                
            </div>
        </div>
        </div>
    </div>
