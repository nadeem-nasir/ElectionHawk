<div class="row">
    <div class="col-lg-12">
        <div class="card card-outline-info">
            <div class="card-header">
                <h4 class="m-b-0 text-white">Edit Agenda Form</h4>
            </div>
            <div class="card-body">
                <h4 class="card-title">Sample Form with the Icons</h4>
                <h6 class="card-subtitle">made with bootstrap elements</h6>

                <form class="form p-t-20" novalidate *ngIf="agenda" (ngSubmit)="save()" [formGroup]="agendaEditForm">
                    
                    <div class="form-group">
                        <label for="description">Description</label>
                        <div class="input-group">
                            <div class="input-group-addon"><i class="ti-email"></i></div>
                            <textarea rows="5" cols="5" class="form-control" formControlName="description" placeholder="Description">{{agenda.description}}</textarea>
                        </div>
                    </div>
                    

                    <button type="submit" class="btn btn-success waves-effect waves-light m-r-10">Submit</button>
                    <button type="submit" class="btn btn-inverse waves-effect waves-light">Cancel</button>
                      
                </form>
                
            </div>
			<div *ngIf='errorMessage' class='alert alert-danger'>
            Error: {{ errorMessage.detail }}
			</div>
			<div *ngIf='msgs?.length>1' class='alert alert-success'>
            {{ msgs.severity }}: {{ msgs.summary }} | {{ msgs.detail }}
        </div>
        </div>
        </div>
    </div>
