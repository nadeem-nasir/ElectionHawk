<div class="row">
 <div class="col-lg-6">
        <div class="card card-outline-info">
            <div class="card-header">
                <h4 class="m-b-0 text-white">Campaign Form</h4>
            </div>
            <div class="card-body">
                <h4 class="card-title">Sample Form with the Icons</h4>
                <h6 class="card-subtitle">made with bootstrap elements</h6>
                <form class="form p-t-20" novalidate (ngSubmit)="save()" [formGroup]="campaignForm">
                    <div class="form-group">
                        <label for="title">Title</label>
                        <div class="input-group">
                            <div class="input-group-addon"><i class="ti-user"></i></div>
                            <input class="form-control" id="title" type="text" formControlName="title" placeholder="title">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="media">Media</label>
                        <div class="input-group">
                            <div class="input-group-addon"><i class="ti-email"></i></div>
                            <textarea rows="5" cols="5" class="form-control" formControlName="media" placeholder="media"></textarea>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="mediumofpropagation">Medium of Propagation</label>
                        <div class="input-group">
                            <div class="input-group-addon"><i class="ti-lock"></i></div>
                            <input class="form-control" id="mediumofpropagation" placeholder="Medium of Propagation" type="text" formControlName="mediumofpropagation">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="forum">Forum</label>
                        <div class="input-group">
                            <div class="input-group-addon"><i class="ti-lock"></i></div>
                            <input class="form-control" id="publishedDate" placeholder="Forum" formControlName="forum" type="text">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="agenda">Agenda</label>
                        <div class="input-group">
                            <div class="input-group-addon"><i class="ti-lock"></i></div>
                            <select formControlName="agendaId"  class="form-control"  placeholder="Select Agenda" >
                               <option *ngFor="let a of agenda" ngValue={{a.itemId}}>
                                {{a.description}}
                            </option>
                        </select>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-success waves-effect waves-light m-r-10">Submit</button>
                    <button type="submit" class="btn btn-inverse waves-effect waves-light">Cancel</button>
                </form>
            </div>
        </div>
        
</div>
    </div>
